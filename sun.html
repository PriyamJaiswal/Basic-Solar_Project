<!DOCTYPE html>
<html lang="en">
<head>
    <title>Looser</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            overflow: hidden;
        }
        .container{
            font-size: 10px;
            height: 40em;
            width: 100em;
            position: relative;
        
        }
        .sun{
            position: absolute;
            top: 15em;
            left: 15em;
            height: 10em;
            width: 10em;
            background-color: yellow;
            border-radius: 50%;
            box-shadow: 0 0 3em white;
        }
        .jupiter{
            position: absolute;
            top: 5em;
            right: 2em;
            height: 20em;
            width: 20em;
            background-color: rgb(255, 255, 255);
            border-radius: 50%;
            box-shadow: 0 0 3em rgb(112, 95, 95);

        }
        .circle1{
            position: absolute;
            top: 5em;
            left: 3em;
            height: 5em;
            width: 3em;
            border-radius: 50%;
            border: 1px solid black;

        }
        .circle3{
            position: absolute;
            top: 2em;
            right: 0.5em;
            height: 3em;
            width: 2.5em;
            border-radius: 50%;
           background-color: black;

        }
        .circle2{
            position: absolute;
            top: 5em;
            right: 3em;
            height: 5em;
            width: 3em;
            border-radius: 50%;
            border: 1px solid black;

        }
        .earth,.moon {
            position: absolute;
            border-style: solid;
            border-color: white transparent transparent transparent;
            border-width: 0.1em 0.1em 0 0;
            border-radius: 50%;
        }
        .earth{
            top: 5em;
            left: 5em;
            height: 30em;
            width: 30em;
            animation: orbit 36.5s linear infinite;
        }
        .moon{
            top: 0;
            right: 0;
            height: 8em;
            width: 8em;
            animation: orbit 2.7s linear infinite;
        }
        .earth::before,.moon::before{
            content: '';
            position: absolute;
            border-radius: 50%;
        }
        .earth::before{
            top: 2.8em;
            right: 2.8em;
            height: 3em;
            width: 3em;
            background-color: aqua;
        }
        .moon::before{
            top: 0.8em;
            right: 0.2em;
            height: 1.2;
            width: 1.2em;
            background-color: silver;
        }
        @keyframes orbit {
            to{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sun"></div>
        <div class="jupiter">
            <div class="circle1">
                <div class="circle3"></div>
            </div>
            <div class="circle2">
                <div class="circle3"></div>
            </div>
            <div class="smile"></div>
        </div>
        <div class="earth">
            <div class="moon"></div>
        </div>
    </div>
    
</body>
</html>
